kind = "web"
previewPath = "/"
title = "Kodály Pathways"
version = "1.0.0"
id = "artifacts/kodaly-pathways"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21610

[services.development]
run = "pnpm --filter @workspace/kodaly-pathways run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kodaly-pathways", "run", "build" ]
publicDir = "artifacts/kodaly-pathways/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21610"
BASE_PATH = "/"
